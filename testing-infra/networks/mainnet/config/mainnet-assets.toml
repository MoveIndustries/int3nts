# Mainnet Assets Configuration
#
# This file contains chain metadata and contract addresses for mainnet chains.
# Used by deployment and configuration scripts.
#
# Format:
#   [chain_name]
#   asset_name = "contract_address"
#   asset_name_decimals = 6  # Optional: specify decimals if different from standard

# =============================================================================
# MOVEMENT MAINNET
# =============================================================================

[movement_mainnet]
chain_id = 250
# rpc_url set via env
native_token = "MOVE"
native_token_decimals = 8

# USDC.e on Movement Mainnet (FA metadata address)
usdc_e = "0x83121c9f9b0527d1f056e21a950d6bf3b9e9e2e8353d0e95ccea726713cbea39"
usdc_e_decimals = 6

# USDCx on Movement Mainnet (FA metadata address)
usdcx = "0xba11833544a2f99eec743f41a228ca6ffa7f13c3b6b04681d5a79a8b75ff225e"
usdcx_decimals = 6

# =============================================================================
# BASE MAINNET
# =============================================================================

[base_mainnet]
chain_id = 8453
